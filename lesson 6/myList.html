<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag & Drop To-Do List</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<link rel="stylesheet"
href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

<style>
body {
    font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    background-image: url("media/paper.jpg");
    background-size: cover;
    padding: 40px;
}

#container {
    width: 600px;
    height: auto;
    margin: auto;
    background: rgb(255, 203, 183);
    opacity: 0.9;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: blue;
    font-size: 2.5em;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}
h3 {
    text-align: center;
    color: maroon;
    margin-top: 0;
    font-size: 1.55em;
}

input {
    width: 70%;
    padding: 10px;
}

button {
    padding: 10px 12px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    padding: 10px;
    margin-bottom: 8px;
    background: #8dbde7;
    border-radius: 4px;
    cursor: move;
}

#trash {
    width: 120px;
    margin: 20px auto 0;
    padding: 10px;
    text-align: center;
    background: #ffd6d6;
    border: 2px dashed rgb(111, 111, 111);
    border-radius: 8px;
    font-size: 14px;
}

.highlight {
    background: #ff9999 !important;
}

#count {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="container">
    <h1>Today's To-Do List</h1>

    <input type="text" id="newItem" placeholder="Enter a task">
    <button id="addBtn">Add</button>

    <ul id="todoList"></ul>

    <div id="trash">Trash</div>

    <div id="count">Items: 0</div>
</div>

<script>
$(document).ready(function() {

    function updateCount() {
        $("#count").text("Items: " + $("#todoList li").length);
    }

    function makeDraggable() {
        $("#todoList li").draggable({
            revert: "invalid",
            helper: "clone"
        });
    }

    $("#todoList").sortable({
        update: function() {
            updateCount();
        }
    });
    $("#trash").droppable({
        accept: "#todoList li",
        hoverClass: "highlight",
        drop: function(event, ui) {
            ui.draggable.remove();
            updateCount();
        }
    });

    $("#addBtn").click(function() {
        let text = $("#newItem").val().trim();

        if (text !== "") {
            $("#todoList").append("<li>" + text + "</li>");
            $("#newItem").val("");
            makeDraggable();
            updateCount();
        }
    });

    $("#newItem").keypress(function(e) {
        if (e.which === 13) {
            $("#addBtn").click();
        }
    });

});
</script>

</body>
</html>
