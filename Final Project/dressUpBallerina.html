<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
<style>

body{
  font-family: 'DynaPuff', cursive;
  background-color: lightpink;
}

#container{
  display:flex;
  justify-content:space-between;
  margin:20px;
}

#hairArea, #dressArea{
  width:27%;
  padding:10px;
  border:3px groove purple;
  border-radius:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
}

#hairArea{
  background:#f6c0da;
}

#dressArea{
  background:#bfd5f6;
}

.item{
  width:45%;       
  margin-bottom:10px;
  cursor:pointer;
  text-align:center;
}
#stage{
  width:40%;
  text-align:center;
}

#message{
  font-size:20px;
  margin-top:10px;
  color:purple;
}

.item{
  margin:10px 0;
  cursor:pointer;
}
#hueSlider {
  margin: 20px;
}

</style>

<script src="https://code.jquery.com/jquery-latest.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">

<script>
$(function(){

    $("#MoveMe1, #MoveMe2, #MoveMe3, #MoveMe4, #MoveMe5").draggable();
    $("#MoveMe6, #MoveMe7, #MoveMe8, #MoveMe9, #MoveMe10, #MoveMe11").draggable();

    $("#done").on("click", function(){
        var name = $("#name").val();
        if(name == "")
            $("#message").html("Please enter a name for your ballerina!");
        else
            $("#message").html("✨ Meet Ballerina " + name + "! ✨");
    });

    if ($("#hueSlider").length) {
        $("#hueSlider").slider({
            min: 0,
            max: 360,
            value: 0,
            slide: function(event, ui) {
                $("#dressArea img").css("filter", "hue-rotate(" + ui.value + "deg)");
            }
        });
    }

});
</script>

<title>Dress Up Ballerina</title>
</head>

<body>

<h1 style="text-align:center;">Dress Up the Ballerina!</h1>
<h3 style="text-align:center;">Drag hair and dresses onto the ballerina</h3>

<div id="container">

    <div id="hairArea">
        <h3>Hair Styles</h3>
        <div class="item" id="MoveMe1"><img src="../lesson 6/media/hairmedia/hair1.png" width="165"></div>
        <div class="item" id="MoveMe2"><img src="../lesson 6/media/hairmedia/hair2.png" width="165"></div>
        <div class="item" id="MoveMe3"><img src="../lesson 6/media/hairmedia/hair3.png" width="165"></div>
        <div class="item" id="MoveMe4"><img src="../lesson 6/media/hairmedia/hair4.png" width="165"></div>
        <div class="item" id="MoveMe5"><img src="../lesson 6/media/hairmedia/hair5.png" width="165"></div>
    </div>

<div id="stage">
    <img src="../lesson 6/media/doll.png" width="250"><br><br>

    Name your ballerina:
    <input type="text" id="name">
    <button id="done">Done</button>

    <div id="message"></div>

    <h3>Adjust Dress Color</h3>
    <div id="hueSlider"></div>
</div>

    <div id="dressArea">
        <h3>Dresses</h3>
        <div class="item" id="MoveMe6"><img src="../lesson 6/media/dressmedia/blue-dress.png" width="170"></div>
        <div class="item" id="MoveMe7"><img src="../lesson 6/media/dressmedia/green-dress.png" width="165"></div>
        <div class="item" id="MoveMe8"><img src="../lesson 6/media/dressmedia/pink-dress.png" width="165"></div>
        <div class="item" id="MoveMe9"><img src="../lesson 6/media/dressmedia/purple-dress.png" width="165"></div>
        <div class="item" id="MoveMe10"><img src="../lesson 6/media/dressmedia/teal-dress.png" width="170"></div>
        <div class="item" id="MoveMe11"><img src="../lesson 6/media/dressmedia/yellow-dress.png" width="165"></div>
    </div>
 

</div>

</body>
</html>
