<!DOCTYPE html>
<html>
<head>
<title> Objects and Methods</title>
<link rel="stylesheet" href="css/multipleObjects.css">
</head>
<body>
    <header>
        <h1>Food Menu</h1>
        <h2>Learn about what food you're eating</h2>
        <h3>On todays menu...</h3>
    </header>
    <article>
        <section>
            <h4> Food Special 1</h4>
            <p>Food Name: <span id="foodName1"></span></p>
            <p>Food Flavor: <span id="foodFlavor1"></span></p>
            <p>Food Region: <span id="foodRegion1"></span></p>
            <p>Food Difficulty: <span id="foodDifficulty1"></span></p>
        </section>
        <section>
            <h4> Food Special 2</h4>
            <p>Food Name: <span id="foodName2"></span></p>
            <p>Food Flavor: <span id="foodFlavor2"></span></p>
            <p>Food Region: <span id="foodRegion2"></span></p>
            <p>Food Difficulty: <span id="foodDifficulty2"></span></p>
        </section>

    </article>
    <footer>Best to eat your meal on <span id="date"></span></footer>
    <script src="js/multipleObjects.js"></script>
</body>
</html>
